<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFitBit - Professor</title>
<style>
body{font-family:"Comic Sans MS",cursive,sans-serif; max-width:950px;margin:auto;padding:20px;background:#a0daf3;color:#2c3e50;}
input,select,button{padding:6px;margin:5px;font-size:1rem;}
button{cursor:pointer;background:#2196F3;color:white;border:none;border-radius:6px;font-weight:bold;}
button:hover{background:#1976D2;}
table{border-collapse:collapse;margin:auto;background:white;border-radius:6px;}
td{border:1px solid #555;text-align:center;font-size:16px;padding:5px;}
.correct{background:#9df29d;border:2px solid green;}
.wrong{background:#ea9e9e;border:2px solid red;}
</style>
</head>
<body>
<h1>BrainFitBit - Painel do Professor</h1>

<!-- CADASTRO DE ALUNO -->
<h2>1️⃣ Cadastrar Novo Aluno</h2>
<label>Nome:</label>
<input type="text" id="new-student-name"><br>
<label>Email:</label>
<input type="email" id="new-student-email"><br>
<button onclick="registerStudent()">Cadastrar Aluno</button>
<p id="register-msg" style="color:green;"></p>

<hr>

<!-- GERAR HOMEWORK -->
<h2>2️⃣ Gerar Homework</h2>
<label>Aluno:</label>
<select id="prof-student-select"></select><br>
<label>Método:</label>
<select id="prof-method">
<option>Simple</option>
<option>Small Friend</option>
<option>Big Friend</option>
<option>Mixed</option>
<option>All</option>
</select><br>
<label>Colunas:</label><input type="number" id="prof-cols" value="3"><br>
<label>Linhas:</label><input type="number" id="prof-rows" value="5"><br>
<label>Questões:</label><input type="number" id="prof-questions" value="5"><br>
<button onclick="generateHomeworkLink()">Gerar Link</button>
<p id="generated-link"></p>

<hr>
<h2>3️⃣ Importar respostas JSON</h2>
<input type="file" id="json-file" accept=".json">
<button onclick="loadStudentAnswers()">Carregar Respostas</button>
<div id="answers-container"></div>

<script>
// ====== ALUNOS ======
function saveStudent(name,email){
  let students = JSON.parse(localStorage.getItem("students")||"[]");
  if(name && email && !students.find(s=>s.email===email)){
    students.push({name,email});
    localStorage.setItem("students",JSON.stringify(students));
  }
}
function loadStudents(){
  let students = JSON.parse(localStorage.getItem("students")||"[]");
  let select = document.getElementById("prof-student-select");
  select.innerHTML="<option value=''>Selecione aluno</option>";
  students.forEach(s=>{
    let opt=document.createElement("option");
    opt.value=s.email;
    opt.text=s.name+" ("+s.email+")";
    select.appendChild(opt);
  });
}
loadStudents();

// ====== CADASTRO DE ALUNO ======
function registerStudent(){
  let name=document.getElementById("new-student-name").value.trim();
  let email=document.getElementById("new-student-email").value.trim();
  if(!name || !email){ alert("Preencha nome e email!"); return; }
  saveStudent(name,email);
  loadStudents();
  document.getElementById("register-msg").innerText="Aluno cadastrado com sucesso!";
  document.getElementById("new-student-name").value="";
  document.getElementById("new-student-email").value="";
}

// ====== GERAR LINK HOMEWORK ======
function generateHomeworkLink(){
  let select=document.getElementById("prof-student-select");
  let studentName = select.value ? select.options[select.selectedIndex].text.split(" (")[0] : "";
  if(!studentName){ alert("Selecione aluno"); return; }
  let method=document.getElementById("prof-method").value;
  let cols=document.getElementById("prof-cols").value;
  let rows=document.getElementById("prof-rows").value;
  let q=document.getElementById("prof-questions").value;

  let url=`brainfitbit.html?student=${encodeURIComponent(studentName)}&method=${method}&cols=${cols}&rows=${rows}&q=${q}`;
  document.getElementById("generated-link").innerText=url;
  prompt("Copie o link:",url);
}

// ====== IMPORTAR JSON ======
function loadStudentAnswers(){
  const fileInput=document.getElementById("json-file");
  if(fileInput.files.length===0){ alert("Escolha um arquivo JSON"); return; }
  const reader=new FileReader();
  reader.onload=function(e){
    const content=e.target.result;
    const data=JSON.parse(content);
    showAnswers(data);
  };
  reader.readAsText(fileInput.files[0]);
}
function showAnswers(data){
  const container=document.getElementById("answers-container");
  container.innerHTML="";
  data.forEach((item,i)=>{
    let div=document.createElement("div");
    let score=0;
    let html="<table>";
    item.moves.forEach(row=>{
      html+="<tr>";
      row.forEach(cell=>html+="<td>"+cell+"</td>");
      html+="</tr>";
    });
    html+="<tr>";
    item.studentAnswers.forEach((val,k)=>{
      let cls=val===item.total?"correct":"wrong";
      if(val===item.total) score++;
      html+="<td class='"+cls+"'>"+val+"</td>";
    });
    html+="</tr></table>";
    div.innerHTML=`<b>Q${i+1} - Score: ${score} / ${item.studentAnswers.length}</b><br>`+html+"<hr>";
    container.appendChild(div);
  });
}
</script>
</body>
</html>
