<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFitBit - Soroban Trainer</title>

<style>
body { font-family:"Comic Sans MS",cursive,sans-serif; max-width:950px; margin:auto; padding:20px; background:#a0daf3; color:#2c3e50; }
#welcome-screen,#menu-container,#table-container { text-align:center; background:rgba(255,255,255,0.95); padding:30px; border-radius:15px; margin-top:20px; }
button { padding:10px 20px; margin:5px; border-radius:8px; background:#2196F3; color:white; border:none; cursor:pointer; }
td{border:1px solid #555;text-align:center;font-size:22px;padding:8px;}
.correct{background:#9df29d;}
.wrong{background:#ea9e9e;}
.answer-input{width:70px;font-size:18px;text-align:center;}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:10px;}
</style>
</head>

<body>

<button onclick="openTeacherLogin()">Teacher</button>

<div id="welcome-screen">
<h1>BrainFitBit</h1>
<input type="text" id="student-name" placeholder="Student name">
<br><br>
<button onclick="showMenu()">Start</button>
</div>

<div id="menu-container" style="display:none">
<h2 id="greeting-text"></h2>

<select id="method">
<option>Simple</option>
<option>Small Friend</option>
<option>Big Friend</option>
<option>Mixed</option>
<option>All</option>
</select>

<input type="number" id="columns" value="3" min="1" max="10">
<input type="number" id="rows" value="5">
<input type="number" id="questions" value="5">

<br><br>
<button onclick="generate()">Generate</button>
</div>

<div id="table-container" style="display:none">
<h2 id="table-title"></h2>
<div id="table"></div>
<div id="result-text"></div>
<div id="restart-container"></div>
</div>

<div id="teacher-modal" class="modal">
<div class="modal-content">
<button onclick="closeModal()">Close</button>
<h3>Teacher Login</h3>
<input id="teacher-id"><br>
<input id="teacher-pass" type="password"><br>
<button onclick="loginTeacher()">Login</button>
<p id="teacher-error"></p>
</div>
</div>

<script>
let data=[], studentName="";

function showMenu(){
  let name=document.getElementById("student-name").value.trim();
  if(!name){ alert("Enter name"); return; }
  studentName=name;
  document.getElementById("welcome-screen").style.display="none";
  document.getElementById("menu-container").style.display="block";
  document.getElementById("greeting-text").innerText="Hello "+name;
}

// ✅ GERA NÚMERO MULTI-DÍGITO
function generateNumber(cols){
  let num=0;

  for(let i=0;i<cols;i++){
    let digit=Math.floor(Math.random()*10);

    if(i===cols-1 && num===0 && digit===0){
      digit=Math.floor(Math.random()*9)+1;
    }

    num += digit*Math.pow(10,i);
  }

  return num;
}

// ✅ VALIDAÇÃO REAL DE SOROBAN (POR COLUNA)
function validMove(total,num,method,op){

  let newTotal = op===1 ? total+num : total-num;
  if(newTotal < 0) return false;

  let t=total;
  let n=num;

  while(t>0 || n>0){

    let td=t%10;
    let nd=n%10;

    // evita +0 ou -0
    if(nd===0){
      t=Math.floor(t/10);
      n=Math.floor(n/10);
      continue;
    }

    if(method==="Simple"){
      if(op===1 && td+nd>9) return false;
      if(op===-1 && td-nd<0) return false;
    }

    if(method==="Small Friend"){
      if(op===1 && td+nd<=4) return false;
      if(op===-1 && td-nd>=5) return false;
    }

    if(method==="Big Friend"){
      if(op===1 && td+nd<10) return false;
      if(op===-1 && td-nd>=0) return false;
    }

    t=Math.floor(t/10);
    n=Math.floor(n/10);
  }

  return true;
}

function generate(){
  let method=document.getElementById("method").value;
  let cols=parseInt(document.getElementById("columns").value);
  let rows=parseInt(document.getElementById("rows").value);
  let q=parseInt(document.getElementById("questions").value);

  data=[];

  for(let i=0;i<q;i++){
    let moves=[], total=0;

    for(let r=0;r<rows;r++){
      let num, sign, valid=false, tries=0;

      while(!valid && tries<100){
        num=generateNumber(cols);
        sign=r===0?1:(Math.random()<0.5?1:-1);

        if(num===0) continue;

        valid=validMove(total,num,method,sign);
        tries++;
      }

      if(!valid){
        num=generateNumber(cols);
        sign=1;
      }

      moves.push(sign*num);
      total += sign*num;
    }

    data.push({moves,total});
  }

  render(rows,q);
  document.getElementById("menu-container").style.display="none";
  document.getElementById("table-container").style.display="block";
  document.getElementById("table-title").innerText="Good luck "+studentName;
}

function render(rows,q){
  let html="<table>";

  for(let r=0;r<rows;r++){
    html+="<tr>";
    for(let i=0;i<q;i++){
      let v=data[i].moves[r];
      html+="<td>"+(v>=0?"+":"")+v+"</td>";
    }
    html+="</tr>";
  }

  html+="<tr>";
  for(let i=0;i<q;i++){
    html+="<td><input type='number' inputmode='numeric' id='a"+i+"' class='answer-input'></td>";
  }
  html+="</tr></table>";

  html+="<br><button onclick='check()'>Check</button>";

  document.getElementById("table").innerHTML=html;
}

function check(){
  let correct=0;

  for(let i=0;i<data.length;i++){
    let input=document.getElementById("a"+i);
    let val=Number(input.value);

    if(val===data[i].total){
      input.classList.add("correct");
      correct++;
    }else{
      input.classList.add("wrong");
      input.value = input.value+" ("+data[i].total+")";
    }

    input.disabled=true;
  }

  document.getElementById("result-text").innerText="Score: "+correct+"/"+data.length;

  document.getElementById("restart-container").innerHTML=
    "<button onclick='restart()'>Restart</button>";
}

function restart(){
  document.getElementById("table-container").style.display="none";
  document.getElementById("menu-container").style.display="block";
}

function openTeacherLogin(){
  document.getElementById("teacher-modal").style.display="flex";
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

function loginTeacher(){
  let id=document.getElementById("teacher-id").value;
  let pass=document.getElementById("teacher-pass").value;

  if(id==="FelipeMoreno" && pass==="2906Noah"){
    alert("Login success");
  }else{
    document.getElementById("teacher-error").innerText="Wrong login";
  }
}
</script>

</body>
</html>
