<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BrainFitBit</title>
<style>
body { font-family: "Comic Sans MS", cursive, sans-serif; max-width: 900px; margin: auto; padding: 20px; background-color: #a0daf3; }
input, select, button { padding: 8px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
td, th { border: 1px solid #ccc; padding: 10px; text-align: center; }
.correct { background: #9df29d; }
.wrong { background: #ea9e9e; }
button { cursor: pointer; font-weight: bold; }
table input {
    text-align: center;       /* centraliza o número digitado */
    width: 60px;              /* largura fixa para uniformidade */
    padding: 5px;             /* deixa o input confortável */
    font-weight: bold;        /* opcional: deixa o número em negrito */
    font-size: 1rem;          /* tamanho legível */
    table td {
    vertical-align: middle;   /* centraliza verticalmente */
}
}
</style>
</head>
<body>

<div style="text-align: center;">
  <img src="BrainFitBitCapy.png" alt="BrainFitBit Image" style="max-width: 30%; height: auto;">
</div>

<div id="menu-container" style="text-align:center;">
  <b>
  Method:
  <select id="method">
    <option>Simple</option>
    <option>Small Friend</option>
    <option>Big Friend</option>
    <option>Mixed</option>
    <option>All</option>
  </select>

  Operations:
  <select id="operation">
    <option>+</option>
    <option>-</option>
    <option>+-</option>
  </select>

  Columns:
  <input type="number" id="columns" value="3" min="1" max="13">

  Rows:
  <input type="number" id="rows" value="5" min="1" max="15">

  Questions:
  <input type="number" id="questions" value="5" min="1" max="10">

  <br>
  <button id="generate-btn" onclick="generate()" style="margin-top:10px;">Let's do it!</button>
  </b>
</div>

<div id="restart-container"></div>
<div id="table"></div>

<script>
let data=[];

// ---------- FUNÇÃO DE VALIDAÇÃO DOS MÉTODOS ----------
function methodValid(total, number, sign, method) {
    let newTotal = total + (number * sign);
    if (newTotal < 0) return false;

    let totalDigits = String(total).padStart(6, '0').split('').map(Number).reverse();
    let numberDigits = String(number).padStart(6, '0').split('').map(Number).reverse();

    let hasSmall = false;
    let hasBig = false;

    for (let i = 0; i < totalDigits.length; i++) {
        let t = totalDigits[i]; // dígito atual (ex: 3)
        let n = numberDigits[i]; // dígito que entra (ex: 2)

        if (sign === 1) { // ADIÇÃO
            if (t + n > 9) {
                hasBig = true;
            } else {
                // Regra do Simple na Adição:
                // As pedras de baixo (t % 5) somadas às novas (n % 5) não podem passar de 4
                // E você não pode adicionar 5 se o 5 já estiver ocupado (t >= 5)
                let beadsBelow = t % 5;
                let incomingBelow = n % 5;
                
                // Se precisar de mais pedras de baixo do que tem livre OU 
                // se tentar somar 5 e o 5 já estiver lá
                if (beadsBelow + incomingBelow > 4 || (n >= 5 && t >= 5)) {
                    hasSmall = true;
                }
            }
        } else { // SUBTRAÇÃO
            if (t < n) {
                hasBig = true;
            } else {
                // Regra do Simple na Subtração:
                // Você tem que ter pedras de baixo suficientes para tirar
                // E se quiser tirar 5, o 5 tem que estar lá (t >= 5)
                let beadsBelow = t % 5;
                let outgoingBelow = n % 5;

                if (beadsBelow < outgoingBelow || (n >= 5 && t < 5)) {
                    hasSmall = true;
                }
            }
        }
    }

    if (method === "Simple") return !hasSmall && !hasBig;
    if (method === "Small Friend") return hasSmall && !hasBig;
    if (method === "Big Friend") return hasBig;
    if (method === "Mixed") return hasSmall && hasBig;
    return true; // All
}

// ---------- FUNÇÃO DE GERAÇÃO DE NÚMEROS ----------
function generateNumber(columns) {
    let number = 0;
    let tries = 0;
    while (number === 0 && tries < 100) {
        let strNum = "";
        for (let i = 0; i < columns; i++) {
            strNum += Math.floor(Math.random() * 10).toString();
        }
        number = parseInt(strNum);
        tries++;
    }
    return number || 1; // Se falhar tudo, retorna 1 para não ser 0
}

// ---------- FUNÇÃO DE GERAÇÃO DE EQUAÇÕES ----------
function generate() {
    let method = document.getElementById("method").value;
    let operationType = document.getElementById("operation").value;
    let columns = parseInt(document.getElementById("columns").value);
    let rows = parseInt(document.getElementById("rows").value);
    let questions = parseInt(document.getElementById("questions").value);

    data = [];

    for (let i = 0; i < questions; i++) {
        let moves = [];
        let total = 0;
        
        for (let r = 0; r < rows; r++) {
            let num;
            let sign;
            let valid = false;
            let tries = 0;

            // Tenta achar um número e sinal que respeitem o método e não resultem em 0
            while (!valid && tries < 100) {
                num = generateNumber(columns);
                sign = 1;
                
                if (r > 0) {
                    if (operationType === "-") sign = -1;
                    else if (operationType === "+-") sign = Math.random() < 0.5 ? 1 : -1;
                }

                // Valida o método e garante que o movimento não seja nulo (+0 ou -0)
                if (num !== 0 && methodValid(total, num, sign, method)) {
                    // Garante que o total acumulado nunca seja negativo
                    if (total + (num * sign) >= 0) {
                        valid = true;
                    }
                }
                tries++;
            }

            // Se após 100 tentativas não achar, força um número simples (1) para não travar
            if (!valid) {
                num = 1;
                sign = (total > 0 && (operationType === "-" || operationType === "+-")) ? -1 : 1;
            }

            total += num * sign;
            moves.push(num * sign);
        }
        data.push({ moves: moves, total: total });
    }

    render(rows, questions);
    document.getElementById("menu-container").style.display = "none";
}

// ---------- FUNÇÃO DE RENDERIZAÇÃO ----------
function render(rows,q){
    let html="<table>";
    for(let r=0;r<rows;r++){
        html+="<tr>";
        for(let i=0;i<q;i++){
            let value = data[i].moves[r];
            html+="<td>"+(value<0?"-":"")+Math.abs(value)+"</td>";
        }
        html+="</tr>";
    }

    html+="<tr>";
    for(let i=0;i<q;i++) html+="<td><input id='a"+i+"'></td>";
    html+="</tr>";
    html+="</table>";

    html+="<div style='text-align:center;'><br><button onclick='check()'>Check Answers</button></div>";
    html+="<span id='result'></span>";

    document.getElementById("table").innerHTML = html;
}

// ---------- FUNÇÃO DE CHECAGEM ----------
function check(){
    let correct=0;
    for(let i=0;i<data.length;i++){
        let input=document.getElementById("a"+i);
        let value=parseInt(input.value)||0;
        input.classList.remove("correct","wrong");
        if(value==data[i].total){
            input.classList.add("correct");
            correct++;
        } else input.classList.add("wrong");
    }
    document.getElementById("result").innerText = "Correct: "+correct+" / "+data.length;
    document.getElementById("restart-container").innerHTML = '<div style="text-align:center;"><button onclick="restart()">Go Again!</button></div>';
}

// ---------- FUNÇÃO DE RESTART ----------
function restart(){
    document.getElementById("table").innerHTML = "";
    document.getElementById("restart-container").innerHTML = "";
    document.getElementById("menu-container").style.display = "block";
    data=[];
}
</script>

</body>
</html>
