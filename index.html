<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFitBit - Soroban Trainer</title>
<style>
    body { font-family:"Comic Sans MS",cursive,sans-serif; max-width:950px; margin:auto; padding:20px; background:#a0daf3; color:#2c3e50; }
    #welcome-screen,#menu-container,#table-container { text-align:center; background:rgba(255,255,255,0.95); padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin-top:20px; }
    h1 { color:#1a73e8; margin-bottom:10px; }
    input,select,button { padding:10px; margin:5px; border-radius:8px; border:1px solid #ccc; font-size:1rem; }
    button { cursor:pointer; background:#2196F3; color:white; border:none; font-weight:bold; transition:transform .2s; }
    button:hover { transform:scale(1.05); background:#1976D2; }
    #table-wrapper{overflow-x:auto;margin:20px 0;padding:10px;}
    table{border-collapse:collapse;margin:auto;background:white;border-radius:8px;}
    td{border:1px solid #555;text-align:center;font-size:24px;min-width:70px;font-weight:bold;padding:10px;}
    .correct{background:#9df29d!important;border:2px solid green;}
    .wrong{background:#ea9e9e!important;border:2px solid red;}
    .answer-input{width:90px;text-align:center;font-size:20px;font-weight:bold;border-radius:5px;border:2px solid #888;}
    .logo-main{max-width:250px;height:auto;}
    .logo-small{max-width:120px;height:auto;margin-bottom:10px;}
    .modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
    .modal-content{background:white;padding:25px;border-radius:12px;max-width:500px;text-align:left;position:relative;}
    .close-btn{float:right;background:#f44336; padding:5px 10px; border-radius:5px; color:white; border:none; cursor:pointer;}
    #teacher-btn{position:fixed;top:20px;right:20px;background:#f44336;z-index:1000;}
</style>
</head>
<body>

<button id="teacher-btn" onclick="openTeacherLogin()">Teacher</button>

<div id="welcome-screen">
    <img src="BrainFitBitCapy.png" class="logo-main" alt="BrainFitBit Logo">
    <h1>Welcome to BrainFitBit!</h1>
    <p>Enter your name to start training.</p>
    <input type="text" id="student-name" placeholder="Student name">
    <br><br>
    <button onclick="showMenu()" style="background:#4CAF50;padding:12px 40px">Next</button>
</div>

<div id="menu-container" style="display:none">
    <img src="BrainFitBitCapy.png" class="logo-small" alt="Logo">
    <h2 id="greeting-text"></h2>
    <hr>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:15px">
        <label><b>Method</b><br>
        <select id="method">
            <option value="Simple">Simple</option>
            <option value="Small Friend">Small Friend</option>
            <option value="Big Friend">Big Friend</option>
            <option value="Mixed">Mixed</option>
            <option value="All">All (Free)</option>
        </select></label>
        <label><b>Columns</b><br>
        <input type="number" id="columns" value="1" min="1" max="13"></label>
        <label><b>Rows</b><br>
        <input type="number" id="rows" value="5" min="2" max="15"></label>
        <label><b>Questions</b><br>
        <input type="number" id="questions" value="5" min="1" max="10"></label>
    </div>
    <br>
    <button onclick="generate()" style="padding:15px 40px;font-size:1.2rem">Let's do it!</button>
</div>

<div id="table-container" style="display:none">
    <h2 id="table-title"></h2>
    <div id="table-wrapper"><div id="table"></div></div>
    <div id="result-text" style="font-size:1.5rem;font-weight:bold;margin:15px"></div>
    <div id="restart-container"></div>
</div>

<div id="teacher-modal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">Close</button>
        <h2>Teacher Login</h2>
        <input type="text" id="teacher-id" placeholder="ID"><br>
        <input type="password" id="teacher-pass" placeholder="Password"><br>
        <button onclick="loginTeacher()">Login</button>
        <p id="teacher-error" style="color:red"></p>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let data = [], studentName = "";

function showMenu() {
    let name = document.getElementById("student-name").value.trim();
    if (!name) { alert("Please enter your name."); return; }
    studentName = name;
    document.getElementById("welcome-screen").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
    document.getElementById("greeting-text").innerText = "Hello, " + studentName + "!";
}

// Generates a number with the exact number of columns requested (no leading zeros unless 1 col)
function generateFullNumber(maxColumns) {
    let num = 0;
    for (let i = 0; i < maxColumns; i++) {
        let digit = Math.floor(Math.random() * 10);
        if (i === maxColumns - 1 && maxColumns > 1 && digit === 0) digit = 1;
        num += digit * Math.pow(10, i);
    }
    return num;
}

// Core Logic: Checks if the move is valid according to Soroban rules for each column
function validMove(total, num, method, op) {
    let newTotal = op === 1 ? total + num : total - num;
    if (newTotal < 0) return false;
    if (method === "All") return true;

    let hasTechnicalMove = false;

    for (let i = 0; i < 13; i++) {
        let p = Math.pow(10, i);
        let dTotal = Math.floor((total / p) % 10);
        let dNum = Math.floor((num / p) % 10);
        if (dNum === 0) continue; 

        let hasFive = dTotal >= 5;
        let lowerBeads = dTotal % 5;

        if (op === 1) { // Addition
            let isSimple = (dNum <= (4 - lowerBeads)) || (dNum >= 5 && !hasFive && (dNum - 5 <= 4 - lowerBeads));
            let isSmall = (dNum < 5) && (dNum > (4 - lowerBeads)) && !hasFive;
            let isBig = (dTotal + dNum >= 10);
            let isMixed = isBig && ((dTotal + dNum) % 10 < 5) && !hasFive;

            if (method === "Simple") { if (!isSimple || isBig) return false; }
            else if (method === "Small Friend") {
                if (isBig) return false;
                if (isSmall) hasTechnicalMove = true;
                else if (!isSimple) return false;
            }
            else if (method === "Big Friend") { 
                if (isBig && !isMixed) hasTechnicalMove = true; 
                else if (!isSimple && !isBig) return false;
            }
            else if (method === "Mixed") { if (isMixed) hasTechnicalMove = true; }
        } 
        else { // Subtraction
            let isSimpleSub = (dNum <= lowerBeads) || (dNum >= 5 && hasFive && (dNum - 5 <= lowerBeads));
            let isSmallSub = (dNum < 5) && (dNum > lowerBeads) && hasFive;
            let isBigSub = (dTotal < dNum);
            let isMixedSub = isBigSub && (dNum > 5) && (dTotal < 5);

            if (method === "Simple") { if (!isSimpleSub || isBigSub) return false; }
            else if (method === "Small Friend") {
                if (isBigSub) return false;
                if (isSmallSub) hasTechnicalMove = true;
                else if (!isSimpleSub) return false;
            }
            else if (method === "Big Friend") { if (isBigSub && !isMixedSub) hasTechnicalMove = true; }
            else if (method === "Mixed") { if (isMixedSub) hasTechnicalMove = true; }
        }
    }
    return true;
}

function generate() {
    const method = document.getElementById("method").value;
    const cols = parseInt(document.getElementById("columns").value);
    const rows = parseInt(document.getElementById("rows").value);
    const q = parseInt(document.getElementById("questions").value);
    
    data = [];
    for (let i = 0; i < q; i++) {
        let moves = [], currentTotal = 0;
        for (let r = 0; r < rows; r++) {
            let num, sign, valid = false, tries = 0;
            while (!valid && tries < 1500) {
                num = generateFullNumber(cols); 
                sign = (r === 0) ? 1 : (Math.random() < 0.5 ? 1 : -1);
                valid = validMove(currentTotal, num, method, sign);
                tries++;
            }
            if (!valid) { num = 1; sign = (currentTotal > 0) ? -1 : 1; }
            moves.push(sign * num);
            currentTotal += (sign * num);
        }
        data.push({ moves: moves, total: currentTotal });
    }
    render(rows, q, method);
    document.getElementById("menu-container").style.display = "none";
    document.getElementById("table-container").style.display = "block";
}

function render(rows, q, method) {
    document.getElementById("table-title").innerHTML = 
        `Student: <b>${studentName}</b><br>` +
        `<span style="font-size: 1.1rem; color: #1a73e8;">Training Mode: <b>${method}</b></span>`;

    let html = "<table>";
    for (let r = 0; r < rows; r++) {
        html += "<tr>";
        for (let i = 0; i < q; i++) {
            let v = data[i].moves[r];
            let display = r === 0 ? Math.abs(v) : (v < 0 ? "-" + Math.abs(v) : "+" + v);
            html += "<td>" + display + "</td>";
        }
        html += "</tr>";
    }
    html += "<tr>";
    for (let i = 0; i < q; i++) {
        html += "<td><input type='number' id='a" + i + "' class='answer-input' placeholder='?'></td>";
    }
    html += "</tr></table>";
    html += "<br><button id='check-btn' onclick='check()'>Check Answers</button>";
    document.getElementById("table").innerHTML = html;
}

function check() {
    let correct = 0;
    for (let i = 0; i < data.length; i++) {
        let input = document.getElementById("a" + i);
        if (Number(input.value) === data[i].total) {
            input.classList.add("correct");
            correct++;
        } else {
            input.classList.add("wrong");
        }
        input.disabled = true;
    }
    document.getElementById("result-text").innerText = `Score: ${correct} / ${data.length}`;
    document.getElementById("restart-container").innerHTML = 
        `<button onclick='restart()'>Restart</button> 
         <button onclick='savePDF()' style='background:#ff9800'>Save Results (PDF)</button>`;
}

function savePDF() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    let method = document.getElementById("method").value;
    doc.setFontSize(18);
    doc.text("BrainFitBit - Training Report", 15, 20);
    doc.setFontSize(12);
    doc.text(`Student: ${studentName} | Method: ${method}`, 15, 30);
    doc.text(`Date: ${new Date().toLocaleDateString()}`, 15, 38);
    doc.line(15, 42, 195, 42);
    let y = 55;
    data.forEach((item, i) => {
        doc.text(`Q${i+1}: ${item.moves.join(" | ")} = ${item.total}`, 15, y);
        y += 10;
        if (y > 280) { doc.addPage(); y = 20; }
    });
    doc.save(`BrainFitBit_${studentName}.pdf`);
}

function restart() {
    document.getElementById("table-container").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
    document.getElementById("result-text").innerText = "";
}

function openTeacherLogin() { document.getElementById("teacher-modal").style.display = "flex"; }
function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
function loginTeacher() {
    let id = document.getElementById("teacher-id").value;
    let pass = document.getElementById("teacher-pass").value;
    if(id === "FelipeMoreno" && pass === "2906Noah") alert("Login Success!");
    else document.getElementById("teacher-error").innerText = "Invalid Login";
}
</script>
</body>
</html>
