<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainFitBit - Soroban Trainer</title>
    <style>
        body { 
            font-family: "Comic Sans MS", cursive, sans-serif; 
            max-width: 950px; 
            margin: auto; 
            padding: 20px; 
            background-color: #a0daf3; 
            color: #2c3e50;
        }

        #welcome-screen, #menu-container, #table-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        h1 { color: #1a73e8; margin-bottom: 10px; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        button { cursor: pointer; background-color: #2196F3; color: white; border: none; font-weight: bold; transition: transform 0.2s; }
        button:hover { transform: scale(1.05); background-color: #1976D2; }

        /* HIDE SPINNERS */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] { -moz-appearance: textfield; }

        #table-wrapper { overflow-x: auto; margin: 20px 0; padding: 10px; }
        table { border-collapse: collapse; margin: auto; background: white; border-radius: 8px; }
        td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 26px; min-width: 85px; font-weight: bold; }

        .correct { background-color: #9df29d !important; border: 2px solid green; }
        .wrong { background-color: #ea9e9e !important; border: 2px solid red; }
        
        .answer-input { 
            width: 75px; 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: bold; 
            outline: none;
        }

        .logo-main { max-width: 250px; height: auto; }
        .logo-small { max-width: 120px; height: auto; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <img src="BrainFitBitCapy.png" alt="BrainFitBit Capybara" class="logo-main">
    <h1>Welcome to BrainFitBit!</h1>
    <p>Get your abacus ready! Enter your name to start:</p>
    <input type="text" id="student-name" placeholder="Student's name">
    <br><br>
    <button onclick="showMenu()" style="background-color: #4CAF50; padding: 12px 40px;">Next</button>
</div>

<div id="menu-container" style="display: none;">
    <img src="BrainFitBitCapy.png" alt="BrainFitBit Capybara" class="logo-small">
    <h2 id="greeting-text"></h2>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
    
    <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;">
        <label><b>Method:</b><br>
            <select id="method">
                <option>Simple</option>
                <option>Small Friend</option>
                <option>Big Friend</option>
                <option>Mixed</option>
                <option>All</option>
            </select>
        </label>
        <label><b>Operations:</b><br>
            <select id="operation">
                <option>+</option>
                <option>-</option>
                <option>+/-</option>
            </select>
        </label>
        <label><b>Max Columns:</b><br>
            <input type="number" id="columns" value="1" min="1" max="6" style="width: 50px;">
        </label>
        <label><b>Rows:</b><br>
            <input type="number" id="rows" value="5" min="1" max="10" style="width: 50px;">
        </label>
        <label><b>Questions:</b><br>
            <input type="number" id="questions" value="5" min="1" max="10" style="width: 50px;">
        </label>
    </div>
    <br>
    <button onclick="generate()" style="padding: 15px 40px; font-size: 1.2rem;">Let's do it!</button>
</div>

<div id="table-container" style="display: none;">
    <h2 id="table-title">Exercises</h2>
    <div id="table-wrapper"><div id="table"></div></div>
    <div id="result-text" style="font-size: 1.5rem; font-weight: bold; margin: 15px;"></div>
    <div id="restart-container"></div>
</div>

<script>
let data = [];
let studentName = "";

function showMenu() {
    studentName = document.getElementById("student-name").value;
    if (!studentName.trim()) { alert("Please enter your name!"); return; }
    document.getElementById("welcome-screen").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
    document.getElementById("greeting-text").innerText = "Hello, " + studentName + "! Settings:";
}

function methodValid(total, number, sign, method) {
    let newTotal = total + (number * sign);
    if (newTotal < 0) return false;
    let tDigits = String(total).padStart(6, '0').split('').map(Number).reverse();
    let nDigits = String(number).padStart(6, '0').split('').map(Number).reverse();
    let hasSmall = false, hasBig = false;

    for (let i = 0; i < 6; i++) {
        let t = tDigits[i], n = nDigits[i];
        if (sign === 1) {
            if (t + n > 9) hasBig = true;
            else if ((t % 5) + (n % 5) > 4 || (n >= 5 && t >= 5)) hasSmall = true;
        } else {
            if (t < n) hasBig = true;
            else if ((t % 5) < (n % 5) || (n >= 5 && t < 5)) hasSmall = true;
        }
    }
    if (method === "Simple") return !hasSmall && !hasBig;
    if (method === "Small Friend") return hasSmall && !hasBig;
    if (method === "Big Friend") return hasBig;
    if (method === "Mixed") return hasSmall && hasBig;
    return true;
}

// ATUALIZADO: Agora sorteia a quantidade de colunas de forma aleatória até o máximo escolhido
function generateNumber(maxColumns) {
    // Sorteia quantas colunas este número específico terá (ex: de 1 até 3)
    let actualColumns = Math.floor(Math.random() * maxColumns) + 1;
    
    let min = Math.pow(10, actualColumns - 1);
    let max = Math.pow(10, actualColumns) - 1;
    if (actualColumns === 1) min = 1; 
    
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generate() {
    let method = document.getElementById("method").value;
    let op = document.getElementById("operation").value;
    let maxCols = parseInt(document.getElementById("columns").value);
    let rows = parseInt(document.getElementById("rows").value);
    let qCount = parseInt(document.getElementById("questions").value);

    data = [];
    for (let i = 0; i < qCount; i++) {
        let moves = [], total = 0;
        for (let r = 0; r < rows; r++) {
            let num, sign = 1, valid = false, tries = 0;
            while (!valid && tries < 500) {
                num = generateNumber(maxCols);
                if (r > 0) {
                    if (op === "-") sign = -1;
                    else if (op === "+/-") sign = Math.random() < 0.5 ? 1 : -1;
                }
                if (r === 0 || methodValid(total, num, sign, method)) valid = true;
                tries++;
            }
            if (!valid) { num = 1; sign = (total > 0 && op !== "+") ? -1 : 1; }
            total += (num * sign);
            moves.push(num * sign);
        }
        data.push({ moves: [...moves], total: total });
    }
    render(rows, qCount);
    document.getElementById("menu-container").style.display = "none";
    document.getElementById("table-container").style.display = "block";
    document.getElementById("table-title").innerText = "Good luck, " + studentName + "!";
}

function render(rows, qCount) {
    let html = "<table>";
    for (let r = 0; r < rows; r++) {
        html += "<tr>";
        for (let i = 0; i < qCount; i++) {
            let val = data[i].moves[r];
            let display = (r === 0) ? Math.abs(val) : (val < 0 ? "-" + Math.abs(val) : "+" + val);
            html += "<td>" + display + "</td>";
        }
        html += "</tr>";
    }
    html += "<tr>";
    for (let i = 0; i < qCount; i++) {
        html += "<td><input type='number' id='a" + i + "' class='answer-input' placeholder='?'></td>";
    }
    html += "</tr></table><br><button onclick='check()' style='padding: 12px 40px;'>Check Answers</button>";
    document.getElementById("table").innerHTML = html;
}

function check() {
    let correct = 0;
    for (let i = 0; i < data.length; i++) {
        let input = document.getElementById("a" + i);
        if (parseInt(input.value) === data[i].total) { input.classList.add("correct"); correct++; }
        else input.classList.add("wrong");
    }
    document.getElementById("result-text").innerText = "Score: " + correct + " out of " + data.length;
    document.getElementById("restart-container").innerHTML = "<button onclick='restart()' style='background-color:#f44336;'>Restart</button>";
}

function restart() {
    document.getElementById("table-container").style.display = "none";
    document.getElementById("menu-container").style.display = "block";
    document.getElementById("result-text").innerText = "";
    document.getElementById("restart-container").innerHTML = "";
    data = [];
}
</script>
</body>

<script>
let data=[];

// ---------- FUNÇÃO DE VALIDAÇÃO DOS MÉTODOS ----------
function methodValid(total, number, sign, method) {
    let newTotal = total + (number * sign);
    if (newTotal < 0) return false;

    let totalDigits = String(total).padStart(6, '0').split('').map(Number).reverse();
    let numberDigits = String(number).padStart(6, '0').split('').map(Number).reverse();

    let hasSmall = false;
    let hasBig = false;

    for (let i = 0; i < totalDigits.length; i++) {
        let t = totalDigits[i]; // dígito atual (ex: 3)
        let n = numberDigits[i]; // dígito que entra (ex: 2)

        if (sign === 1) { // ADIÇÃO
            if (t + n > 9) {
                hasBig = true;
            } else {
                // Regra do Simple na Adição:
                // As pedras de baixo (t % 5) somadas às novas (n % 5) não podem passar de 4
                // E você não pode adicionar 5 se o 5 já estiver ocupado (t >= 5)
                let beadsBelow = t % 5;
                let incomingBelow = n % 5;
                
                // Se precisar de mais pedras de baixo do que tem livre OU 
                // se tentar somar 5 e o 5 já estiver lá
                if (beadsBelow + incomingBelow > 4 || (n >= 5 && t >= 5)) {
                    hasSmall = true;
                }
            }
        } else { // SUBTRAÇÃO
            if (t < n) {
                hasBig = true;
            } else {
                // Regra do Simple na Subtração:
                // Você tem que ter pedras de baixo suficientes para tirar
                // E se quiser tirar 5, o 5 tem que estar lá (t >= 5)
                let beadsBelow = t % 5;
                let outgoingBelow = n % 5;

                if (beadsBelow < outgoingBelow || (n >= 5 && t < 5)) {
                    hasSmall = true;
                }
            }
        }
    }

    if (method === "Simple") return !hasSmall && !hasBig;
    if (method === "Small Friend") return hasSmall && !hasBig;
    if (method === "Big Friend") return hasBig;
    if (method === "Mixed") return hasSmall && hasBig;
    return true; // All
}

// ---------- FUNÇÃO DE GERAÇÃO DE NÚMEROS ----------
function generateNumber(columns) {
    let number = 0;
    let tries = 0;
    while (number === 0 && tries < 100) {
        let strNum = "";
        for (let i = 0; i < columns; i++) {
            strNum += Math.floor(Math.random() * 10).toString();
        }
        number = parseInt(strNum);
        tries++;
    }
    return number || 1; // Se falhar tudo, retorna 1 para não ser 0
}

// ---------- FUNÇÃO DE GERAÇÃO DE EQUAÇÕES ----------
function generate() {
    let method = document.getElementById("method").value;
    let operationType = document.getElementById("operation").value;
    let columns = parseInt(document.getElementById("columns").value);
    let rows = parseInt(document.getElementById("rows").value);
    let questions = parseInt(document.getElementById("questions").value);

    data = [];

    for (let i = 0; i < questions; i++) {
        let moves = [];
        let total = 0;
        
        for (let r = 0; r < rows; r++) {
            let num;
            let sign;
            let valid = false;
            let tries = 0;

            // Tenta achar um número e sinal que respeitem o método e não resultem em 0
            while (!valid && tries < 100) {
                num = generateNumber(columns);
                sign = 1;
                
                if (r > 0) {
                    if (operationType === "-") sign = -1;
                    else if (operationType === "+-") sign = Math.random() < 0.5 ? 1 : -1;
                }

                // Valida o método e garante que o movimento não seja nulo (+0 ou -0)
                if (num !== 0 && methodValid(total, num, sign, method)) {
                    // Garante que o total acumulado nunca seja negativo
                    if (total + (num * sign) >= 0) {
                        valid = true;
                    }
                }
                tries++;
            }

            // Se após 100 tentativas não achar, força um número simples (1) para não travar
            if (!valid) {
                num = 1;
                sign = (total > 0 && (operationType === "-" || operationType === "+-")) ? -1 : 1;
            }

            total += num * sign;
            moves.push(num * sign);
        }
        data.push({ moves: moves, total: total });
    }

    render(rows, questions);
    document.getElementById("menu-container").style.display = "none";
}

// ---------- FUNÇÃO DE RENDERIZAÇÃO ----------
function render(rows,q){
    let html="<table>";
    for(let r=0;r<rows;r++){
        html+="<tr>";
        for(let i=0;i<q;i++){
            let value = data[i].moves[r];
            html+="<td>"+(value<0?"-":"")+Math.abs(value)+"</td>";
        }
        html+="</tr>";
    }

    html+="<tr>";
    for(let i=0;i<q;i++) html+="<td><input id='a"+i+"'></td>";
    html+="</tr>";
    html+="</table>";

    html+="<div style='text-align:center;'><br><button onclick='check()'>Check Answers</button></div>";
    html+="<span id='result'></span>";

    document.getElementById("table").innerHTML = html;
}

// ---------- FUNÇÃO DE CHECAGEM ----------
function check(){
    let correct=0;
    for(let i=0;i<data.length;i++){
        let input=document.getElementById("a"+i);
        let value=parseInt(input.value)||0;
        input.classList.remove("correct","wrong");
        if(value==data[i].total){
            input.classList.add("correct");
            correct++;
        } else input.classList.add("wrong");
    }
    document.getElementById("result").innerText = "Correct: "+correct+" / "+data.length;
    document.getElementById("restart-container").innerHTML = '<div style="text-align:center;"><button onclick="restart()">Go Again!</button></div>';
}

// ---------- FUNÇÃO DE RESTART ----------
function restart(){
    document.getElementById("table").innerHTML = "";
    document.getElementById("restart-container").innerHTML = "";
    document.getElementById("menu-container").style.display = "block";
    data=[];
}
</script>

</body>
</html>
