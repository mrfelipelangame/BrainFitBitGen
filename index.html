<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFitBit - Soroban Trainer</title>

<style>
body { font-family:"Comic Sans MS",cursive,sans-serif; max-width:950px; margin:auto; padding:20px; background:#a0daf3; color:#2c3e50; }
#welcome-screen,#menu-container,#table-container { text-align:center; background:rgba(255,255,255,0.95); padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin-top:20px; }
h1 { color:#1a73e8; }
input,select,button { padding:10px; margin:5px; border-radius:8px; border:1px solid #ccc; font-size:1rem; }
button { cursor:pointer; background:#2196F3; color:white; border:none; font-weight:bold; }
button:hover { transform:scale(1.05); background:#1976D2; }
td{border:1px solid #555;text-align:center;font-size:24px;min-width:50px;font-weight:bold;padding:8px;}
.correct{background:#9df29d!important;}
.wrong{background:#ea9e9e!important;}
.answer-input{width:60px;text-align:center;font-size:20px;}
.logo-main{max-width:250px;}
.logo-small{max-width:120px;}
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:white;padding:25px;border-radius:12px;}
.close-btn{float:right;background:#f44336;}
#teacher-btn{position:fixed;top:20px;right:20px;background:#f44336;color:white;padding:10px;border:none;border-radius:8px;}
</style>
</head>

<body>

<button id="teacher-btn" onclick="openTeacherLogin()">Teacher</button>

<div id="welcome-screen">
<h1>BrainFitBit</h1>
<input type="text" id="student-name" placeholder="Student name">
<br><br>
<button onclick="showMenu()">Next</button>
</div>

<div id="menu-container" style="display:none">
<h2 id="greeting-text"></h2>

<select id="method">
<option>Simple</option>
<option>Small Friend</option>
<option>Big Friend</option>
<option>Mixed</option>
<option>All</option>
</select>

<input type="number" id="columns" value="1" min="1" max="13">
<input type="number" id="rows" value="5">
<input type="number" id="questions" value="5">

<br><br>
<button onclick="generate()">Start</button>
</div>

<div id="table-container" style="display:none">
<h2 id="table-title"></h2>
<div id="table"></div>
<div id="result-text"></div>
<div id="restart-container"></div>
</div>

<div id="teacher-modal" class="modal">
<div class="modal-content">
<button class="close-btn" onclick="closeModal()">Close</button>
<h2>Teacher Login</h2>
<input type="text" id="teacher-id"><br>
<input type="password" id="teacher-pass"><br>
<button onclick="loginTeacher()">Login</button>
<p id="teacher-error"></p>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let data=[], studentName="";

function showMenu(){
  let name=document.getElementById("student-name").value.trim();
  if(!name){ alert("Enter name"); return; }
  studentName=name;
  welcome-screen.style.display="none";
  menu-container.style.display="block";
  greeting-text.innerText="Hello "+name;
}

function generateNumber(maxColumns){
  let column=Math.floor(Math.random()*maxColumns);
  let digit=Math.floor(Math.random()*10);
  return digit*Math.pow(10,column);
}

// ✅ MÉTODOS CORRIGIDOS
function validMove(total,num,method,op){

  let newTotal = op===1 ? total+num : total-num;
  if(newTotal < 0) return false;

  let digit = num % 10;
  let currentDigit = total % 10;

  if(method === "Simple"){
    if(op === 1 && currentDigit + digit > 9) return false;
    if(op === -1 && currentDigit - digit < 0) return false;
  }

  if(method === "Small Friend"){
    if(op === 1 && currentDigit + digit <= 4) return false;
    if(op === -1 && currentDigit - digit >= 5) return false;
  }

  if(method === "Big Friend"){
    if(op === 1 && currentDigit + digit <= 9) return false;
    if(op === -1 && currentDigit - digit >= 0) return false;
  }

  return true;
}

function generate(){
  let method=method.value;
  let cols=parseInt(columns.value);
  let rows=parseInt(rows.value);
  let q=parseInt(questions.value);

  data=[];

  for(let i=0;i<q;i++){
    let moves=[], total=0;

    for(let r=0;r<rows;r++){
      let num, sign, tries=0, valid=false;

      while(!valid && tries<100){
        num = generateNumber(cols);
        sign = r===0 ? 1 : (Math.random()<0.5 ? 1 : -1);
        valid = validMove(total,num,method,sign);
        tries++;
      }

      if(!valid){
        num = generateNumber(cols);
        sign = 1;
      }

      moves.push(sign*num);
      total += sign*num;
    }

    data.push({moves,total});
  }

  render(rows,q);
  menu-container.style.display="none";
  table-container.style.display="block";
  table-title.innerText="Good luck "+studentName;
}

function render(rows,q){
  let html="<table>";

  for(let r=0;r<rows;r++){
    html+="<tr>";
    for(let i=0;i<q;i++){
      let v=data[i].moves[r];
      html+="<td>"+(v>=0?"+":"")+v+"</td>";
    }
    html+="</tr>";
  }

  html+="<tr>";
  for(let i=0;i<q;i++){
    html+="<td><input type='number' inputmode='numeric' id='a"+i+"' class='answer-input'></td>";
  }
  html+="</tr></table>";

  html+="<br><button onclick='check()'>Check</button>";

  table.innerHTML=html;
}

function check(){
  let correct=0;

  for(let i=0;i<data.length;i++){
    let input=document.getElementById("a"+i);
    let val=Number(input.value);

    if(val===data[i].total){
      input.classList.add("correct");
      correct++;
    }else{
      input.classList.add("wrong");
      input.value = input.value + " ("+data[i].total+")";
    }

    input.disabled=true;
  }

  result-text.innerText="Score: "+correct+"/"+data.length;

  restart-container.innerHTML=
    "<button onclick='restart()'>Restart</button>"+
    "<button onclick='savePDF()'>PDF</button>";
}

function restart(){
  table-container.style.display="none";
  menu-container.style.display="block";
  result-text.innerText="";
  restart-container.innerHTML="";
}

function closeModal(){
  document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

function openTeacherLogin(){
  document.getElementById("teacher-modal").style.display="flex";
}

function loginTeacher(){
  let id=teacher-id.value.trim();
  let pass=teacher-pass.value.trim();

  if(id==="FelipeMoreno" && pass==="2906Noah"){
    alert("Login success (demo)");
  }else{
    teacher-error.innerText="Wrong login";
  }
}

// ✅ PDF CORRIGIDO
function savePDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  doc.text("Student: "+studentName,10,10);

  let y=20;

  data.forEach((q,i)=>{
    doc.text("Q"+(i+1)+": "+q.moves.join(" "),10,y);
    doc.text("Answer: "+q.total,150,y);
    y+=10;
  });

  doc.save("BrainFitBit.pdf");
}

</script>

</body>
</html>
