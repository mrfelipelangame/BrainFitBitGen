<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainFitBit - Student</title>
<style>
body { font-family:"Comic Sans MS",cursive,sans-serif; max-width:950px; margin:auto; padding:20px; background:#a0daf3; color:#2c3e50; }
h1,h2{ color:#1a73e8; text-align:center;}
input,button{padding:8px;margin:5px;font-size:1rem;}
button{cursor:pointer;background:#2196F3;color:white;border:none;border-radius:6px;font-weight:bold;}
button:hover{background:#1976D2;}
table{border-collapse:collapse;margin:auto;background:white;border-radius:8px;}
td{border:1px solid #555;text-align:center;font-size:18px;padding:6px;}
.correct{background:#9df29d;border:2px solid green;}
.wrong{background:#ea9e9e;border:2px solid red;}
.answer-input{width:60px;text-align:center;font-weight:bold;}
</style>
</head>
<body>
<h1>BrainFitBit</h1>
<h2 id="table-title"></h2>
<div id="table-wrapper"><div id="table"></div></div>
<div id="result-text"></div>
<div id="actions">
<button onclick="check()">Check Answers</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="savePDF()">Save PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let data=[], studentName="";

// READ URL PARAMETERS
window.onload = function(){
  const params = new URLSearchParams(window.location.search);
  studentName = params.get("student") || "Student";
  const method = params.get("method") || "Simple";
  const cols = parseInt(params.get("cols")) || 3;
  const rows = parseInt(params.get("rows")) || 5;
  const q = parseInt(params.get("q")) || 5;
  generateHomework(method, cols, rows, q);
};

// RANDOM NUMBER GENERATOR
function generateNumber(maxColumns){
  let column = Math.floor(Math.random()*maxColumns);
  let digit = Math.floor(Math.random()*9)+1;
  return digit * Math.pow(10,column);
}

// GENERATE EXERCISES
function generateHomework(method,cols,rows,q){
  data=[];
  for(let i=0;i<q;i++){
    let moves=[], total=0;
    for(let r=0;r<rows;r++){
      let num = generateNumber(cols);
      let sign = r===0 ? 1 : (Math.random()<0.5 ? 1 : -1);
      moves.push(sign*num);
      total += sign*num;
    }
    data.push({moves:moves,total:total});
  }
  render(rows,q);
  document.getElementById("table-title").innerText="Good luck, "+studentName+"!";
}

// RENDER TABLE
function render(rows,q){
  let html="<table>";
  for(let r=0;r<rows;r++){
    html+="<tr>";
    for(let i=0;i<q;i++){
      let v=data[i].moves[r];
      html+="<td>"+(v<0?v:"+"+v)+"</td>";
    }
    html+="</tr>";
  }
  html+="<tr>";
  for(let i=0;i<q;i++){
    html+="<td><input type='number' id='a"+i+"' class='answer-input' placeholder='?'></td>";
  }
  html+="</tr></table>";
  document.getElementById("table").innerHTML=html;
}

// CHECK ANSWERS
function check(){
  let correct=0;
  for(let i=0;i<data.length;i++){
    let input=document.getElementById("a"+i);
    let val=Number(input.value);
    if(val===data[i].total){ input.classList.add("correct"); correct++; }
    else{ input.classList.add("wrong"); }
    input.disabled=true;
  }
  document.getElementById("result-text").innerText="Score: "+correct+" / "+data.length;
  document.getElementById("actions").querySelector("button").remove(); // remove Check Answers button
}

// EXPORT JSON
function exportJSON(){
  let exportData=data.map((item,i)=>{
    let answers=[];
    for(let j=0;j<data.length;j++){
      let val=document.getElementById("a"+j).value;
      answers.push(Number(val));
    }
    return {moves:item.moves,total:item.total,studentAnswers:answers};
  });
  let blob=new Blob([JSON.stringify(exportData)],{type:"application/json"});
  let url=URL.createObjectURL(blob);
  let a=document.createElement("a");
  a.href=url;
  a.download=studentName+"_answers.json";
  a.click();
}

// SAVE PDF
function savePDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();
  doc.setFontSize(14);
  doc.text("Student: "+studentName,15,15);
  let y=25;
  data.forEach((item,i)=>{
    doc.text("Q"+(i+1)+": "+item.moves.join(" "),15,y);
    let input=document.getElementById("a"+i);
    let val=input ? input.value : "";
    doc.setTextColor(val==item.total?0:200, val==item.total?150:0,0); // green if correct, red if wrong
    doc.text("Answer: "+val,150,y);
    y+=10;
  });
  doc.save(studentName+"_BrainFitBit.pdf");
}
</script>
</body>
</html>
